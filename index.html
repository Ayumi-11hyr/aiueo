<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>あいうえバトル</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>
  <div id="app">
    <header>
      <h1>あいうえバトル</h1>
      <div id="roomInfo" style="display:none; font-size: 14px; margin-top: 8px; color: #666;">
        ルームID: <strong id="roomNumber"></strong>
        <button id="copyRoomIdBtn" style="margin-left:8px; cursor:pointer; font-size:12px;">コピー</button>
        <button id="leaveBtn" style="margin-left:12px; cursor:pointer; font-size:12px; background:#f44336; color:white; border:none; border-radius:4px; padding:2px 8px; display:none;">退室</button>
      </div>
    </header>

    <section id="lobby" class="panel">
      <div style="margin-bottom: 16px;">
        <input id="nameInput" placeholder="表示名を入力" />
      </div>

      <div class="lobby-grid">
        <div class="lobby-card">
          <h3>新しいルームを作成</h3>
          <p>友達を招待してバトル開始</p>
          <button id="createBtn" style="width: 100%; padding: 12px; font-size: 16px;">ルーム作成</button>
        </div>

        <div class="lobby-card">
          <h3>既存のルームに参加</h3>
          <p>招待されたルームIDを入力</p>
          <input id="joinRoomId" placeholder="ルームID" />
          <button id="joinBtn" style="width: 100%; padding: 12px; font-size: 16px;">参加する</button>
        </div>
      </div>
      <div id="roomLink" class="room-link"></div>
    </section>

    <section id="game" class="panel" style="display:none;">
      <div id="gamePhaseInfo"></div>
      <div id="themeArea" style="display:none; padding: 10px; background: #eee; border-left: 5px solid #06c; margin-bottom: 10px; font-weight: bold;">
        お題: <span id="themeDisplay"></span>
      </div>
      
      <!-- ゲーム進行中：ボードと文字指定（最上部へ移動） -->
      <div id="controls" style="display:none;">
        <div id="turnStatusContainer">
          <div id="turnInfo"></div>
          <div id="timerDisplay" style="font-size: 18px; font-weight: bold; color: #d32f2f; margin-bottom: 8px;"></div>
        </div>
        <div id="charSelector" style="display:none;">
          <p>指定する文字を選んでください</p>
          <div id="kanaButtons"></div>
        </div>
        <div id="resetArea" style="text-align: center; margin-top: 20px;">
          <button id="resetGameBtn" style="display:none; padding: 10px 20px; background: #f44336; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold;">もう一度遊ぶ</button>
        </div>
      </div>
      <div id="boardArea"></div>

      <!-- 準備フェーズ：単語入力 -->
      <div id="wordInputPhase" style="display:none;">
        <h3>自分の単語を決めてください（2～10文字）</h3>
        <input id="wordInput" placeholder="2〜10文字の単語を入力" />
        <button id="submitWord">OK</button>
      </div>

      <!-- ホスト用：開始ボタン -->
      <div id="startGameBtn" style="display:none;">
        <div id="themeInputArea" style="margin-bottom: 10px;">
          <label style="display:block; font-size:14px; margin-bottom:4px;">今回のお題（30文字以内）:</label>
          <input id="themeInput" placeholder="例：くだもの、アニメキャラ、歴史上の人物" style="width:100%; padding:8px; box-sizing:border-box;" maxlength="30" />
        </div>
        <button id="startBtn">対戦を開始する</button>
      </div>

      <div id="log"></div>
    </section>
  </div>

  <script src="firebase.js"></script>
  <script src="ui.js"></script>
  <script src="gameLogic.js"></script>
  <script src="main.js"></script>
</body>
</html>
